<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Secretaría Técnica del Club</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #e8f5e9; }
        .panel-tactico { display: flex; flex-direction: column; gap: 10px; max-width: 400px; background: white; padding: 20px; border-radius: 8px; border: 2px solid #2e7d32;}
        button { padding: 10px; cursor: pointer; font-weight: bold; background-color: #2e7d32; color: white; border: none; border-radius: 4px;}
        button:hover { background-color: #1b5e20; }
    </style>
</head>
<body>
    <h1>Base de Datos de Ojeadores (Scouting)</h1>
    <p>Abre el VAR (la Consola con F12) para leer los reportes.</p>
    
    <div class="panel-tactico">
        <!-- Estos botones llaman a las jugadas preparadas en nuestro archivo JS -->
        <button onclick="directorDeportivo.listarNombres()">1. Ver Plantilla Completa</button>
        <button onclick="directorDeportivo.infoBasica()">2. Ficha Básica del Jugador</button>
        <button onclick="directorDeportivo.direccionCompleta()">3. Dirección del Jugador</button>
        <button onclick="directorDeportivo.infoAvanzada()">4. Info Avanzada y Representante</button>
        <button onclick="directorDeportivo.listarCompanias()">5. Listar Agencias Representantes</button>
        <button onclick="directorDeportivo.listarNombresOrdenados()">6. Plantilla Ordenada (A-Z)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
